---
# Ansible playbook to deploy the devops-demo-app from Docker Hub
# Usage: ansible-playbook -i inventory.ini deploy.yml -e image_tag=123

- hosts: local
  gather_facts: false
  vars:
    image_repo: "nabinrb2787/devops-demo-app"
    image_tag: "{{ image_tag | default('latest') }}"
    image_pull_source: "{{ image_source | default('pull', true) }}"
    image_ref: "{{ image_repo }}:{{ image_tag }}"

  tasks:
    - name: Pull image from Docker Hub
      community.docker.docker_image:
        name: "{{ image_ref }}"
        source: "{{ image_pull_source }}"

    - name: Stop and remove existing container (if any)
      community.docker.docker_container:
        name: devops-demo-app
        state: absent
      ignore_errors: yes

    - name: Run container
      community.docker.docker_container:
        name: devops-demo-app
        image: "{{ image_ref }}"
        state: started
        restart_policy: always
        published_ports:
          - "3000:3000"
        env:
          VERSION: "{{ image_tag }}"

    - name: Wait for application health endpoint
      ansible.builtin.command: docker exec devops-demo-app wget -qO- http://127.0.0.1:3000/health
      register: health_check
      retries: 5
      delay: 3
      until: health_check.rc == 0
      changed_when: false

    - name: Print deployed container info
      ansible.builtin.debug:
        msg: "Deployed {{ image_repo }}:{{ image_tag }}"
